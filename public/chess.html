<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Rattan March | MathQuest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/chess.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6", // Đổi màu chủ đạo sang Xanh dương cho hợp Trắng/Đen
                        "background-dark": "#0f172a",
                        "surface": "#1e293b"
                    },
                    fontFamily: {
                        display: ["Lexend", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark text-white font-display min-h-screen flex flex-col overflow-x-hidden">

<header class="sticky top-0 z-50 w-full bg-surface border-b border-slate-700 px-6 py-3 flex items-center justify-between gap-4 shadow-sm h-20">
    <div class="flex items-center gap-3 cursor-pointer group shrink-0" onclick="window.location.href='index.html'">
        <div class="bg-primary p-2.5 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 group-hover:scale-105 transition-transform">
            <span class="material-symbols-outlined text-white text-3xl">grid_4x4</span>
        </div>
        <h2 class="text-2xl font-black tracking-tighter text-white uppercase">
            Rattan<span class="text-primary">March</span>
        </h2>
    </div>

    <div class="flex items-center gap-6 shrink-0">
        <div class="bg-slate-900 border border-slate-700 pl-2 pr-4 py-1.5 rounded-full flex items-center gap-2 shadow-sm cursor-pointer hover:border-yellow-400 transition-colors">
            <div class="bg-yellow-900/30 p-1 rounded-full">
                <span class="material-symbols-outlined text-[#facc15] text-xl block">monetization_on</span>
            </div>
            <span class="text-sm font-black text-white tracking-wide"><span id="user-coin">0</span></span>
        </div>
        
        <div class="relative cursor-pointer group" onclick="window.location.href='userProfile.html'">
            <svg class="w-14 h-14 -rotate-90 transform" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="6" fill="transparent" class="text-slate-700" />
                <circle id="level-progress-circle" cx="50" cy="50" r="46" stroke="currentColor" stroke-width="6" fill="transparent" class="text-primary transition-all duration-1000 ease-out" stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round" />
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
                <img id="user-avatar-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-10 h-10 rounded-full border-2 border-slate-800 shadow-sm">
            </div>
            <div class="absolute -bottom-1 -right-1 bg-primary text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-800 shadow-md z-10">
                <span id="user-level-badge">1</span>
            </div>
        </div>
    </div>
</header>

<div class="flex flex-1 w-full max-w-[1440px] mx-auto p-6 gap-6 flex-col lg:flex-row">
    
    <aside class="w-full lg:w-80 flex flex-col gap-6 shrink-0 h-[calc(100vh-120px)]">
        <div class="bg-surface rounded-xl p-5 border border-slate-700 shadow-sm flex-1 flex flex-col h-full overflow-hidden">
            <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-700">
                <h3 class="font-bold text-sm uppercase tracking-wider text-gray-400">Lịch sử nước đi</h3>
                <span class="text-primary font-bold text-sm bg-primary/10 px-2 py-1 rounded" id="progress-text">0/64</span>
            </div>
            <div id="move-log" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-2 pr-2">
                <div class="text-center text-sm text-gray-500 mt-4 italic">Hệ thống đang thiết lập ô xuất phát...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-surface rounded-xl border border-slate-700 shadow-sm p-6 relative">
        <div class="flex justify-between items-center mb-6 bg-slate-900 p-4 rounded-xl border border-slate-700">
            <div>
                <h2 class="text-2xl font-black text-white uppercase tracking-widest">Logic Puzzle</h2>
                <p class="text-gray-400 text-sm mt-1">Target Sum (Mục tiêu tổng): <span id="target-display" class="font-bold text-primary text-lg">---</span></p>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-1">Thời gian</span>
                <span id="game-timer" class="text-3xl font-mono font-black text-white tracking-widest">00:00</span>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center py-4 overflow-auto relative">
            
            <div id="input-overlay" class="absolute inset-0 z-50 hidden flex items-center justify-center bg-slate-900/80 rounded-xl backdrop-blur-sm">
                <div class="bg-surface border border-slate-600 p-8 rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col items-center gap-4">
                    <h3 class="text-gray-300 font-bold tracking-widest uppercase text-xs mb-2">Nhập giá trị tại ô hiện tại</h3>
                    
                    <input type="text" inputmode="numeric" id="cell-input" 
                           class="w-40 text-center bg-[#0f1a14] border-2 border-slate-600 focus:border-primary rounded-xl text-4xl font-black py-4 text-primary outline-none focus:ring-4 focus:ring-primary/20 transition-all" 
                           autocomplete="off" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           onkeydown="if(event.key === 'Enter' || event.keyCode === 13) { event.preventDefault(); window.submitMove(); }">
                    
                    <button id="btn-submit-val" onclick="window.submitMove()" class="w-full bg-primary hover:bg-blue-500 text-white font-black py-3 rounded-xl transition-all mt-4 uppercase tracking-widest shadow-lg shadow-blue-500/20 active:scale-95">
                        Xác nhận (Enter)
                    </button>
                    <p class="text-[10px] text-gray-500 mt-2 uppercase">Hoặc nhấn phím Enter trên bàn phím</p>
                </div>
            </div>

            <div class="relative bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-700">
                <div id="top-sums" class="grid grid-cols-8 gap-0 mb-3 ml-12 w-[480px]"></div>
                <div class="flex">
                    <div id="left-sums" class="grid grid-rows-8 gap-0 mr-3 h-[480px] flex flex-col justify-around"></div>
                    
                    <div id="chessboard" class="grid grid-cols-8 grid-rows-8 w-[480px] h-[480px] border-4 border-slate-800 rounded-sm overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                        </div>
                </div>
            </div>
        </div>

        <div class="border-t border-slate-700 pt-6 mt-auto flex justify-between items-center">
            <div class="flex gap-4 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                <span class="px-3 py-1.5 bg-slate-900 rounded border border-slate-700">Click ô sáng để đi Mã</span>
                <span class="px-3 py-1.5 bg-slate-900 rounded border border-slate-700"><kbd class="font-mono text-primary font-black">ESC</kbd> = Hoàn tác</span>
            </div>
            <div class="flex gap-3">
                <button onclick="window.undoMove()" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-slate-800 border border-slate-600 hover:bg-slate-700 text-white font-bold transition-all uppercase text-sm tracking-wider">
                    <span class="material-symbols-outlined text-sm">undo</span> Hoàn tác
                </button>
                <button onclick="window.surrenderGame()" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-red-600/20 border border-red-500/50 hover:bg-red-600 text-red-500 hover:text-white font-bold transition-all uppercase text-sm tracking-wider">
                    <span class="material-symbols-outlined text-sm">flag</span> Chịu Thua
                </button>
            </div>
        </div>
    </main>
</div>

<script src="js/auth.js"></script> 
<script src="js/games/chess.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof Auth !== 'undefined' && Auth.user) {
            const coinEl = document.getElementById('user-coin');
            const lvlEl = document.getElementById('user-level-badge');
            if(coinEl) coinEl.innerText = (Auth.user.coins || 0).toLocaleString();
            if(lvlEl) lvlEl.innerText = Auth.user.level || 1;
        }
    });
</script>
<script src="js/auth.js"></script> 
<script src="js/userProfile.js"></script> <script src="js/games/chess.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Đồng bộ dữ liệu người dùng thật lên Header
        if (typeof Auth !== 'undefined' && Auth.user) {
            // 1. Cập nhật Vàng (Coins)
            const coinEl = document.getElementById('user-coin');
            if (coinEl) {
                coinEl.innerText = (Auth.user.coins || 0).toLocaleString();
            }

            // 2. Cập nhật Avatar và Vòng Level (Dùng chung hàm với trang chủ)
            if (typeof UserProfile !== 'undefined' && typeof UserProfile.updateUI === 'function') {
                UserProfile.updateUI(Auth.user.exp || 0, Auth.user.avatarId || 'avatar_1');
            } else {
                // Fallback dự phòng nếu UserProfile chưa tải kịp
                const lvlEl = document.getElementById('user-level-badge');
                const avatarImg = document.getElementById('user-avatar-img');
                
                if (lvlEl) lvlEl.innerText = Auth.user.level || 1;
                if (avatarImg) {
                    // Nếu hệ thống lưu avatar dạng URL
                    if (Auth.user.avatarUrl) avatarImg.src = Auth.user.avatarUrl;
                    // Nếu hệ thống lưu avatar dạng ID (vd: avatar_2)
                    else if (Auth.user.avatarId) avatarImg.src = `assets/avatars/${Auth.user.avatarId}.png`; 
                }
            }
        }
    });
</script>
</body>
</html>
</body>
</html>
