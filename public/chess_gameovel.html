<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MISSION CLEARED | Rattan March</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1152d4",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark text-slate-100 font-display min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 pointer-events-none opacity-20">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-500/30 to-transparent blur-xl"></div>
    </div>

    <div class="z-10 bg-slate-900 border border-slate-800 rounded-2xl p-10 shadow-2xl flex flex-col items-center max-w-lg w-full text-center">
        
        <div class="size-20 bg-emerald-500/10 border border-emerald-500/50 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
            <span class="material-symbols-outlined text-5xl text-emerald-500">verified</span>
        </div>

        <h1 class="text-4xl font-bold tracking-tight text-white mb-2">Algorithm Solved</h1>
        <p class="text-slate-400 mb-8">Ma phương Knight's Tour đã được giải mã hoàn toàn.</p>

        <div class="w-full bg-slate-800 rounded-xl p-6 mb-8 border border-slate-700 grid grid-cols-2 gap-4">
            <div class="flex flex-col items-center justify-center border-r border-slate-700 pr-4">
                <span class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Total Moves</span>
                <span class="text-3xl font-mono font-bold text-white">64</span>
            </div>
            <div class="flex flex-col items-center justify-center pl-4">
                <span class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Clear Time</span>
                <span id="final-time" class="text-3xl font-mono font-bold text-emerald-500">00:00</span>
            </div>
        </div>

        <div class="flex gap-4 w-full">
            <button onclick="window.location.href='index.html'" class="flex-1 bg-transparent hover:bg-slate-800 border border-slate-600 text-slate-300 font-bold py-3 rounded-xl transition-colors">
                Trang chủ
            </button>
            <button onclick="window.location.href='chess.html'" class="flex-1 bg-primary hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-[0_4px_15px_rgba(17,82,212,0.4)] transition-all transform active:scale-95">
                Chơi Ván Mới
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Đọc thời gian từ localStorage
            const seconds = localStorage.getItem('chess_time_elapsed');
            if (seconds) {
                const m = Math.floor(parseInt(seconds) / 60).toString().padStart(2, '0');
                const s = (parseInt(seconds) % 60).toString().padStart(2, '0');
                document.getElementById('final-time').innerText = `${m}:${s}`;
            }
        });
    </script>
</body>
</html>
