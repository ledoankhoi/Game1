<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GAME OVER | Rattan March</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0f172a] text-white h-screen flex flex-col overflow-hidden">

    <header class="h-20 bg-[#1e293b] border-b border-slate-700 flex items-center justify-between px-8 shrink-0">
        <h1 id="status-title" class="text-3xl font-black uppercase tracking-widest text-red-500">MISSION FAILED</h1>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Time Elapsed</p>
                <p id="time-display" class="text-2xl font-mono font-black text-white">00:00</p>
            </div>
            <div class="h-10 w-px bg-slate-700"></div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Final Score</p>
                <p id="score-display" class="text-3xl font-mono font-black text-primary">0</p>
            </div>
            <button onclick="window.location.href='chess.html'" class="ml-4 bg-primary hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl transition-all uppercase tracking-widest shadow-lg active:scale-95">
                Play Again
            </button>
        </div>
    </header>

    <main class="flex-1 flex p-6 gap-6 overflow-hidden">
        
        <div class="w-1/4 bg-[#1e293b] border border-slate-700 rounded-2xl flex flex-col overflow-hidden">
            <div class="p-4 bg-emerald-500/10 border-b border-emerald-500/30 text-emerald-500 text-center font-bold uppercase tracking-widest text-sm">
                Correct Sequence
            </div>
            <div id="correct-log" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 custom-scrollbar"></div>
        </div>

        <div class="w-1/2 bg-[#1e293b] border border-slate-700 rounded-2xl p-8 flex flex-col items-center justify-center relative">
            <h3 class="text-gray-400 font-bold uppercase tracking-widest mb-6">Target Sum: <span id="target-sum-display" class="text-white text-xl">---</span></h3>
            
            <div id="correct-board" class="grid grid-cols-8 grid-rows-8 w-full max-w-[500px] aspect-square border-4 border-slate-800 shadow-2xl rounded-sm">
                </div>
        </div>

        <div class="w-1/4 bg-[#1e293b] border border-slate-700 rounded-2xl flex flex-col overflow-hidden">
            <div class="p-4 bg-slate-800 border-b border-slate-700 text-white text-center font-bold uppercase tracking-widest text-sm">
                Your Moves
            </div>
            <div id="player-log" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 custom-scrollbar"></div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('chess_game_data');
            if(!dataStr) return window.location.href = 'chess.html';
            
            const data = JSON.parse(dataStr);
            
            // Render Header
            if(data.isWin) {
                const title = document.getElementById('status-title');
                title.innerText = "MISSION ACCOMPLISHED";
                title.className = "text-3xl font-black uppercase tracking-widest text-emerald-500";
            }
            
            document.getElementById('target-sum-display').innerText = data.targetSum;
            
            const m = Math.floor(data.timeElapsed / 60).toString().padStart(2, '0');
            const s = (data.timeElapsed % 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${m}:${s}`;

            // Render Center Board (Correct Answer)
            const boardEl = document.getElementById('correct-board');
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const cell = document.createElement('div');
                    const isDark = (r + c) % 2 !== 0;
                    cell.className = `flex items-center justify-center font-bold text-xl ${isDark ? 'bg-gray-700 text-white' : 'bg-gray-200 text-black'}`;
                    cell.innerText = data.correctGrid[r][c];
                    
                    // Highlight start and end
                    if(r === data.correctPath[0][0] && c === data.correctPath[0][1]) cell.innerHTML += `<div class="absolute inset-1 border-2 border-blue-500"></div>`;
                    if(r === data.correctPath[63][0] && c === data.correctPath[63][1]) cell.innerHTML += `<div class="absolute inset-1 border-2 border-red-500"></div>`;
                    
                    boardEl.appendChild(cell);
                }
            }

            // Render Logs and Calculate Score
            const correctLog = document.getElementById('correct-log');
            const playerLog = document.getElementById('player-log');
            let correctMovesCount = 0;

            for(let i=0; i<64; i++) {
                // Correct Log Item
                const cMove = data.correctPath[i];
                const cVal = data.correctGrid[cMove[0]][cMove[1]];
                correctLog.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded border border-emerald-500/20">
                        <span class="text-xs text-gray-500 w-6">${i+1}.</span>
                        <span class="text-sm font-bold text-gray-300">R${cMove[0]+1} C${cMove[1]+1}</span>
                        <span class="text-sm font-black text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded">${cVal}</span>
                    </div>
                `;

                // Player Log Item
                const pMove = data.playerPath[i];
                if(pMove) {
                    const isPosCorrect = (pMove.r === cMove[0] && pMove.c === cMove[1]);
                    const isValCorrect = (pMove.val === cVal);
                    const isTotallyCorrect = isPosCorrect && isValCorrect;
                    
                    if (isTotallyCorrect) correctMovesCount++;

                    const borderColor = isTotallyCorrect ? 'border-emerald-500/50' : 'border-red-500/50';
                    const valColor = isValCorrect ? 'text-emerald-400' : 'text-red-400';
                    const posColor = isPosCorrect ? 'text-gray-300' : 'text-red-400 line-through';

                    playerLog.innerHTML += `
                        <div class="flex justify-between items-center bg-slate-800/50 p-2 rounded border ${borderColor}">
                            <span class="text-xs text-gray-500 w-6">${i+1}.</span>
                            <span class="text-sm font-bold ${posColor}">R${pMove.r+1} C${pMove.c+1}</span>
                            <span class="text-sm font-black ${valColor} bg-slate-900 px-2 py-1 rounded">${pMove.val}</span>
                        </div>
                    `;
                } else {
                    // Missed moves
                    playerLog.innerHTML += `
                        <div class="flex justify-between items-center bg-red-900/10 p-2 rounded border border-red-500/20 opacity-50">
                            <span class="text-xs text-gray-600">${i+1}.</span>
                            <span class="text-sm font-bold text-gray-600">---</span>
                        </div>
                    `;
                }
            }

            // Điểm số = (Số bước đúng * 50) - (Thời gian * 2) + Thưởng thắng
            let baseScore = correctMovesCount * 50;
            let timePenalty = data.timeElapsed * 2;
            let finalScore = Math.max(0, baseScore - timePenalty);
            if(data.isWin) finalScore += 5000;

            document.getElementById('score-display').innerText = finalScore.toLocaleString();
        });
    </script>
</body>
</html>
