<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OUT OF MOVES | 2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1152d4",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark text-slate-100 font-display min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute inset-0 pointer-events-none opacity-20">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-red-500/30 to-transparent blur-2xl"></div>
    </div>

    <div class="z-10 bg-slate-900 border border-slate-800 rounded-3xl p-10 shadow-2xl flex flex-col items-center max-w-md w-full text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>

        <div class="size-20 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
            <span class="material-symbols-outlined text-5xl text-red-500">extension_off</span>
        </div>

        <h1 class="text-4xl font-black tracking-tight text-white mb-2 uppercase">GAME OVER</h1>
        <p class="text-slate-400 mb-8 font-medium">Bảng đã đầy! Không còn nước đi nào hợp lệ.</p>

        <div class="w-full grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 flex flex-col items-center">
                <span class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Final Score</span>
                <span id="final-score" class="text-3xl font-black text-white">0</span>
            </div>
            <div class="bg-emerald-900/10 rounded-xl p-4 border border-emerald-900/30 flex flex-col items-center">
                <span class="text-[10px] uppercase tracking-widest text-emerald-600/70 font-bold mb-1">Best Score</span>
                <span id="best-score" class="text-3xl font-black text-emerald-500">0</span>
            </div>
        </div>

        <div class="flex flex-col gap-3 w-full">
            <button onclick="window.location.href='puzzle.html'" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all transform active:scale-95 uppercase tracking-widest">
                THỬ LẠI LẦN NỮA
            </button>
            <button onclick="window.location.href='/'" class="w-full bg-transparent hover:bg-slate-800 border border-slate-700 text-slate-400 hover:text-white font-bold py-3 rounded-xl transition-colors uppercase tracking-widest text-sm">
                VỀ LOBBY TRANG CHỦ
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastScore = localStorage.getItem('puzzle_last_score') || 0;
            const bestScore = localStorage.getItem('puzzle_best_score') || 0;
            
            document.getElementById('final-score').innerText = parseInt(lastScore).toLocaleString();
            document.getElementById('best-score').innerText = parseInt(bestScore).toLocaleString();
        });
    </script>
</body>
</html>
