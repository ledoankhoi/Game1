<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Quantum Speed Circuit - MATH RACE</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#005359", "on-background": "#ecedf6", "on-tertiary-container": "#f8f1ff",
              "secondary-fixed-dim": "#ffa8e7", "on-secondary-container": "#fff5f8", "primary-dim": "#00deec",
              "on-primary-fixed-variant": "#005e64", "outline": "#73757d", "secondary": "#ff59e3",
              "on-tertiary-fixed-variant": "#4700a7", "surface-variant": "#22262f", "on-tertiary-fixed": "#1f0052",
              "tertiary": "#ac89ff", "on-secondary-fixed-variant": "#950085", "on-error-container": "#ffa8a3",
              "inverse-surface": "#f9f9ff", "secondary-dim": "#ff59e3", "surface": "#0b0e14",
              "surface-tint": "#8ff5ff", "tertiary-fixed": "#bda1ff", "secondary-fixed": "#ffbeeb",
              "surface-dim": "#0b0e14", "primary": "#8ff5ff", "inverse-primary": "#006a71",
              "on-primary-fixed": "#003f43", "on-primary": "#005d63", "on-secondary-fixed": "#640059",
              "error-dim": "#d7383b", "primary-fixed": "#00eefc", "surface-container": "#161a21",
              "error": "#ff716c", "tertiary-dim": "#874cff", "secondary-container": "#ad009b",
              "tertiary-container": "#7000ff", "on-tertiary": "#290067", "primary-container": "#00eefc",
              "on-error": "#490006", "surface-container-high": "#1c2028", "tertiary-fixed-dim": "#b190ff",
              "primary-fixed-dim": "#00deec", "on-surface-variant": "#a9abb3", "on-surface": "#ecedf6",
              "background": "#0b0e14", "surface-container-lowest": "#000000", "surface-container-low": "#10131a",
              "outline-variant": "#45484f", "surface-container-highest": "#22262f", "error-container": "#9f0519",
              "on-secondary": "#42003a", "surface-bright": "#282c36", "inverse-on-surface": "#52555c"
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
              "label": ["Lexend", "sans-serif"]
            }
          }
        }
      }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/race.css">
</head>

<body class="bg-background text-on-background font-body overflow-hidden h-screen select-none flex flex-col">
    
    <div id="game-header-container" class="z-[100] relative"></div>

    <main class="relative flex-1 w-full perspective-grid overflow-hidden">
        <button id="btn-pause" class="absolute top-4 right-6 z-50 text-cyan-400 hover:scale-105 transition-transform active:scale-95 duration-100 bg-surface-container-high/50 p-2 rounded-full backdrop-blur-md">
            <span class="material-symbols-outlined">pause</span>
        </button>

        <div class="absolute inset-0 opacity-20 pointer-events-none">
            <div class="data-stream left-[20%] top-[-100px]" style="animation: fall 3s linear infinite"></div>
            <div class="data-stream left-[45%] top-[-100px]" style="animation: fall 2.5s linear infinite 0.5s"></div>
            <div class="data-stream left-[75%] top-[-100px]" style="animation: fall-slow 4s linear infinite 1s"></div>
        </div>

        <div class="circuit-track absolute inset-x-0 bottom-0 h-[150%] w-[1200px] mx-auto flex">
            <div class="w-1/3 border-r-2 border-primary/20 bg-gradient-to-b from-transparent via-primary/5 to-transparent"></div>
            <div class="w-1/3 border-r-2 border-primary/20 bg-gradient-to-b from-transparent via-white/5 to-transparent"></div>
            <div class="w-1/3 bg-gradient-to-b from-transparent via-tertiary/5 to-transparent"></div>
        </div>

        <div id="player-car" class="absolute bottom-1/4 transform -translate-x-1/2 z-20" style="left: 50%;">
            <div class="relative w-48 h-24">
                <div class="absolute -top-16 left-1/2 -translate-x-1/2 w-48 text-center">
                    <div class="bg-surface-container-highest/80 backdrop-blur-xl p-3 tech-clip border border-primary/30 shadow-[0_0_25px_rgba(143,245,255,0.3)]">
                        <span id="math-question" class="font-headline text-xl text-on-surface tracking-tighter">? + ? = ?</span>
                    </div>
                </div>
                <div class="w-full h-full bg-gradient-to-b from-slate-200 to-slate-400 rounded-full blur-[2px] opacity-80" style="clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);">
                    <div class="absolute top-2 left-4 right-4 h-4 bg-primary/40 rounded-full blur-md"></div>
                </div>
                <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-40 h-8 bg-primary/20 blur-xl rounded-full"></div>
            </div>
        </div>

        <div class="absolute left-1/2 -translate-x-1/2 w-[1200px] h-full pointer-events-none z-10">
            <div id="gates-container" class="absolute w-full flex pb-6" style="bottom: 100%; transform-origin: bottom center;">
                
                <div class="w-1/3 flex justify-center">
                    <div id="gate-box-0" class="gate-box bg-surface-container-low/70 backdrop-blur-md border-y-4 border-outline w-2/3 py-10 rounded-2xl text-center transition-all duration-300 shadow-[0_10px_30px_rgba(0,0,0,0.4)]">
                        <span id="gate-text-0" class="font-headline text-6xl font-black text-on-surface-variant">0</span>
                    </div>
                </div>
                
                <div class="w-1/3 flex justify-center">
                    <div id="gate-box-1" class="gate-box bg-surface-container-low/70 backdrop-blur-md border-y-4 border-outline w-2/3 py-10 rounded-2xl text-center transition-all duration-300 shadow-[0_10px_30px_rgba(0,0,0,0.4)]">
                        <span id="gate-text-1" class="font-headline text-6xl font-black text-on-surface-variant">0</span>
                    </div>
                </div>
                
                <div class="w-1/3 flex justify-center">
                    <div id="gate-box-2" class="gate-box bg-surface-container-low/70 backdrop-blur-md border-y-4 border-outline w-2/3 py-10 rounded-2xl text-center transition-all duration-300 shadow-[0_10px_30px_rgba(0,0,0,0.4)]">
                        <span id="gate-text-2" class="font-headline text-6xl font-black text-on-surface-variant">0</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="absolute bottom-12 right-12 z-50 flex flex-col items-end gap-2">
            <div class="flex items-baseline gap-2">
                <span class="font-label text-xs text-outline uppercase tracking-widest">Score</span>
                <span id="score-display" class="font-headline text-5xl font-black text-secondary tracking-tighter">0</span>
            </div>
            <div class="flex items-baseline gap-2">
                <span class="font-label text-xs text-outline uppercase tracking-widest">Velocity</span>
                <span id="speed-display" class="font-headline text-3xl font-bold text-primary tracking-tighter">100</span>
                <span class="font-label text-sm text-primary/60">KM/H</span>
            </div>
        </div>
        
        <div id="game-over-overlay" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_#161a21_0%,_#0b0e14_100%)] opacity-0 transition-opacity duration-500">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-500 to-transparent opacity-50"></div>

            <div class="relative w-full max-w-xl p-4 flex flex-col items-center justify-center h-full max-h-[90vh] transform translate-y-10 transition-transform duration-700" id="game-over-panel">
                
                <div class="w-full glass-panel relative rounded-3xl p-8 text-center shadow-[0_0_50px_rgba(255,0,50,0.15)] overflow-hidden flex flex-col justify-center border border-white/10 bg-black/60 backdrop-blur-md">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-500/10 rotate-45 transform"></div>

                    <div class="mb-6">
                        <span class="material-symbols-outlined text-6xl text-red-500 animate-bounce" style="font-variation-settings: 'FILL' 1;">car_crash</span>
                        <h1 class="text-4xl font-black mt-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white to-red-500/50 uppercase drop-shadow-lg">SYSTEM FAILURE</h1>
                        <p class="text-xs text-red-400 mt-1 font-mono uppercase tracking-widest font-bold">WRONG ANSWER</p>
                    </div>

                    <div class="bg-black/60 rounded-2xl p-6 border border-white/5 mb-6 shadow-inner">
                        <p class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-bold">Final Score</p>
                        <div class="text-5xl font-mono font-black text-white drop-shadow-[0_0_15px_rgba(255,0,50,0.8)] mb-4" id="final-score">0</div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">
                                <span class="text-[10px] text-gray-400 uppercase font-bold block mb-1">Coins</span>
                                <span id="earned-coins" class="text-2xl font-black text-yellow-400">+0</span>
                            </div>
                            <div class="bg-green-500/10 border border-green-500/30 rounded-xl p-3">
                                <span class="text-[10px] text-gray-400 uppercase font-bold block mb-1">EXP</span>
                                <span id="earned-exp" class="text-2xl font-black text-green-400">+0</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button id="btn-restart" class="flex-1 py-4 bg-primary text-black font-black uppercase text-sm tracking-wider transition-all hover:scale-105 rounded-xl shadow-[0_0_20px_rgba(143,245,255,0.4)]">
                            REBOOT (R)
                        </button>
                        <button id="btn-exit" class="flex-1 py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-gray-300 font-bold uppercase text-sm tracking-wider transition-all hover:text-white">
                            EXIT TO LOBBY
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/scoreManager.js"></script>
    <script src="js/rewardManager.js"></script>
    <script src="js/game-header.js"></script> 
    <script src="./js/games/race.js"></script> 
</body>
</html>
