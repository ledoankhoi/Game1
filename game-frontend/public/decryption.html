<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DECRYPTION | Elite League</title>
    
    <link rel="stylesheet" href="css/decryption.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "bg-dark": "#050505", "surface": "#121212",
                        "neon-blue": "#00f3ff", "neon-pink": "#ff00ff",
                        "neon-green": "#0aff00", "neon-red": "#ff003c"
                    },
                    fontFamily: { "display": ["Lexend", "sans-serif"] },
                },
            },
        }
    </script>
</head>
<body class="bg-bg-dark text-white font-display min-h-screen flex flex-col items-center justify-center overflow-hidden select-none">

    <main class="relative z-10 flex flex-col items-center gap-8 mt-10">
        <div id="status-bar" class="h-2 w-64 bg-surface rounded-full overflow-hidden border border-white/10">
            <div id="status-fill" class="h-full w-0 bg-neon-blue shadow-[0_0_10px_#00f3ff] transition-all duration-300"></div>
        </div>
        <p id="game-msg" class="text-neon-blue text-sm font-bold tracking-[0.2em] uppercase animate-pulse h-6 text-center">WAITING FOR SIGNAL...</p>

        <div class="relative p-6 bg-surface/50 border border-white/10 rounded-3xl backdrop-blur-sm shadow-2xl">
            <div id="game-grid" class="grid grid-cols-3 gap-4"></div>
            
            <div id="overlay-start" class="absolute inset-0 bg-black/80 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center z-20">
                <button id="btn-start" class="group relative px-8 py-4 bg-transparent overflow-hidden rounded-xl">
                    <div class="absolute inset-0 w-full h-full bg-neon-blue/10 group-hover:bg-neon-blue/20 transition-all border border-neon-blue/50 rounded-xl"></div>
                    <span class="relative text-neon-blue font-black tracking-[0.2em] text-xl group-hover:text-white transition-colors">INITIATE_HACK</span>
                </button>
            </div>
        </div>
    </main>

    <div id="decrypt-gameover-overlay" class="fixed inset-0 z-[99999] hidden flex-col items-center justify-center bg-black/90 backdrop-blur-xl opacity-0 transition-opacity duration-500">
        <div class="absolute inset-0 pointer-events-none z-0">
            <div class="absolute inset-0 bg-[radial-gradient(circle,#ff003c_1px,transparent_1px)] bg-[length:32px_32px] opacity-20"></div>
        </div>

        <div class="relative z-10 w-full max-w-md bg-[#121212] border border-neon-red/30 rounded-3xl p-10 shadow-[0_0_50px_rgba(255,0,60,0.2)] text-center transform scale-95 transition-transform duration-500" id="decrypt-gameover-panel">
            <div class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-neon-red/10 border border-neon-red/40 rotate-45">
                <span class="material-icons text-5xl text-neon-red -rotate-45 glitch-text">sensors_off</span>
            </div>

            <h1 class="text-3xl font-black text-neon-red mb-1 uppercase tracking-widest glitch-text">Signal Lost</h1>
            <p class="text-gray-500 text-[10px] mb-8 tracking-[0.3em] font-mono uppercase">Decryption process terminated</p>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-black/50 border border-white/5 rounded-xl p-4">
                    <span class="text-[9px] text-gray-500 uppercase font-bold block mb-1">Final Level</span>
                    <span id="go-final-level" class="text-2xl font-black text-white">01</span>
                </div>
                <div class="bg-black/50 border border-white/5 rounded-xl p-4">
                    <span class="text-[9px] text-gray-500 uppercase font-bold block mb-1">Total Score</span>
                    <span id="go-final-score" class="text-2xl font-black text-neon-blue">0</span>
                </div>
            </div>

            <div id="go-reward-container" class="mb-10 hidden">
                <div class="flex justify-center items-center gap-4 py-3 bg-neon-blue/5 border border-neon-blue/20 rounded-2xl">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-yellow-400 text-sm" style="font-variation-settings: 'FILL' 1">monetization_on</span>
                        <span id="go-earned-coins" class="text-sm font-black text-yellow-400">+0</span>
                    </div>
                    <div class="w-px h-4 bg-white/10"></div>
                    <div class="flex items-center gap-2">
                        <span class="material-icons text-neon-green text-sm" style="font-variation-settings: 'FILL' 1">star</span>
                        <span id="go-earned-exp" class="text-sm font-black text-neon-green">+0</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="location.reload()" class="w-full py-4 bg-neon-blue text-black font-black uppercase text-xs tracking-widest rounded-xl hover:bg-white transition-all shadow-[0_0_20px_rgba(0,243,255,0.4)]">RE-ESTABLISH LINK</button>
                <button onclick="window.location.href='/'" class="w-full py-3 border border-white/10 text-gray-500 font-bold uppercase text-[10px] tracking-widest rounded-xl hover:text-white transition-all">EXIT PROTOCOL</button>
            </div>
        </div>
    </div>

    <script src="js/game-header.js"></script>
    <script src="js/rewardManager.js"></script>
    <script src="./js/games/decryption.js"></script>
</body>
</html>
